<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YeaMovie</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <a class="logo" href="/">KINOMONSTER</a>
      <div class="search-field">
        <img class="search-field__icon" src="/icons/search.svg" alt="" />
        <input
          class="search-field__input"
          placeholder="Поиск..."
          id="input-header"
          type="text"
        />
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="hero__inner">
          <div class="hero__content">
            <div class="hero__info">
              <p class="hero__attention">УЖЕ В КИНО</p>
              <h2 class="hero__title">Чужой: Ромул (2024)</h2>
            </div>
            <div class="hero__actions">
              <p class="hero__description">
                Исследуя заброшенную космическую станцию, группа колонизаторов
                сталкивается с самой ужасающей формой жизни во Вселенной.
              </p>
              <button class="hero__button">Смотреть</button>
            </div>
          </div>
          <div class="hero__image-wrapper">
            <img
              class="hero__afisha"
              src="/photo/афиша.png"
              alt="Афиша фильма"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
