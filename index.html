<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YeaMovie</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <a class="logo" href="/">KINOMONSTER</a>
      <div class="search-field">
        <img class="search-field__icon" src="/icons/search.svg" alt="" />
        <input
          class="search-field__input"
          placeholder="Поиск..."
          id="input-header"
          type="text"
        />
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="hero__inner">
          <div class="hero__content">
            <div class="hero__info">
              <p class="hero__attention">УЖЕ В КИНО</p>
              <h2 class="hero__title">Чужой: Ромул (2024)</h2>
            </div>
            <div class="hero__actions">
              <p class="hero__description">
                Исследуя заброшенную космическую станцию, группа колонизаторов
                сталкивается с самой ужасающей формой жизни во Вселенной.
              </p>
              <button class="hero__button">Смотреть</button>
            </div>
          </div>
          <div class="hero__image-wrapper">
            <img
              class="hero__afisha"
              src="/photo/афиша.png"
              alt="Афиша фильма"
            />
          </div>
        </div>
      </section>
      <section class="catalog">
        <div class="catalog__header">
          <button class="catalog__tab" data-type="popularMovies">
            Популярные фильмы
          </button>
          <button class="catalog__tab" data-type="series">
            Популярные сериалы
          </button>
          <button class="catalog__tab" data-type="movies">
            Подборка фильмов
          </button>
        </div>
        <div class="catalog__grid"></div>
      </section>
      <section class="catalog__filter">
        <div class="catalog__filter-buttn-wrapper">
          <button class="catalog__filter-button">Фильмы по категориям</button>
        </div>
        <div class="catalog__filter-selects">
          <select
            class="catalog__filter-tab"
            data-filter="genre"
            type="checkbox"
          >
            <option class="catalog__select" disabled selected hidden value="">
              Жанр
            </option>
          </select>
          <select
            class="catalog__filter-tab"
            data-filter="country"
            type="checkbox"
          >
            <option class="catalog__select" disabled selected hidden value="">
              Страна
            </option>
          </select>
          <select
            class="catalog__filter-tab"
            data-filter="year"
            type="checkbox"
          >
            <option class="catalog__select" disabled selected hidden value="">
              Год
            </option>
          </select>
          <select
            class="catalog__filter-tab"
            data-filter="rating"
            type="checkbox"
          >
            <option class="catalog__select" disabled selected hidden value="">
              Рейтинг
            </option>
          </select>
        </div>
        <div class="catalog__filter-grid"></div>
      </section>
    </main>
    <footer>
      <a class="logo" href="/">KINOMONSTER</a>
      <nav>
        <ul class="footer__list">
          <li class="foooter-item">
            <a class="footer-link" href="">Главная</a>
          </li>
          <li class="foooter-item">
            <a class="footer-link" href="">Популярные фильмы</a>
          </li>
          <li class="foooter-item">
            <a class="footer-link" href="">Популярные сериалы</a>
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
